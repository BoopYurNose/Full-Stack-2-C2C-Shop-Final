<!DOCTYPE html>
<html>
    <head>
        <title>CarSellingSite</title>
        <meta name = "viewport" content = "width=device-width, initial-scale=1">
        <link rel = "stylesheet" href = "Style.css">
    </head>

    <body>
        <div class="TopBar">
            <a href = "HomePage.html">Home</a>
            <a href = "CarList.html">Cars For Sale</a>
            
        </div>

        <div class = "SecondaryBar">
            <form id = "SearchBar">
                <input type = "text" id = "MakeInput" placeholder = "Make">
                <input type = "text" id = "ModelInput" placeholder = "Model">
                <input type = "number" id = "MaxPriceInput" placeholder = "Max Price">
                <input type = "number" id = "MaxMileageInput" placeholder = "Max Mileage">
            <select id = "SortInput">
                <option value = "">Sort By</option>
                <option value = "price-asc">Price: Low to High</option>
                <option value = "Price-desc">Price: High to Low</option>
                <option value = "Mileage-asc">Mileage: Low to High</option>
                <option value = "Mileage-desc">Mileage: High to Low</option>
                <option value = "Year-desc">Year: Newest First</option>
                <option value = "Year-asc">Year: Oldest first</option>
                
            </select>


                <button type = "submit" id = "SearchButton">Search</button>
            </form>

            <button type = "button" id = "Reset" onclick = "ClearSearchInput()">Reset</button>
        </div>

        <ul id = "CarListContainer"></ul>

        <script src = "JavaScript.js"></script>
    </body>
</html>
